# ============================================================
# 关键 MsgSchema(只列最常用的,完整列表由 importer 从 msg/ 目录抽取)
# ============================================================

- type: MsgSchema
  id: agibot_x2.schema.msg.mc_locomotion_velocity
  properties:
    name: aimdk_msgs/msg/McLocomotionVelocity
    fields:
      - { name: header,           type: MessageHeader }
      - { name: source,           type: string,  description: "输入源名称,二开自定义" }
      - { name: forward_velocity, type: float64, unit: m/s,  description: "前进为正" }
      - { name: lateral_velocity, type: float64, unit: m/s,  description: "左为正" }
      - { name: angular_velocity, type: float64, unit: rad/s, description: "逆时针为正" }
  source: { type: document, locator: "aimdk.docx#§5.1.2" }

- type: MsgSchema
  id: agibot_x2.schema.msg.joint_command
  properties:
    name: aimdk_msgs/msg/JointCommand
    fields:
      - { name: name,         type: string,  description: "关节名称(可不填,依位置顺序)" }
      - { name: position,     type: float64, unit: rad }
      - { name: velocity,     type: float64, unit: rad/s }
      - { name: effort,       type: float64, unit: Nm }
      - { name: stiffness,    type: float64, unit: "Nm/rad" }
      - { name: damping,      type: float64, unit: "Nm·s/rad" }
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: MsgSchema
  id: agibot_x2.schema.msg.joint_state
  properties:
    name: aimdk_msgs/msg/JointState
    fields:
      - { name: name,       type: string }
      - { name: position,   type: float64, unit: rad }
      - { name: velocity,   type: float64, unit: rad/s }
      - { name: effort,     type: float64, unit: Nm }
      - { name: coil_temp,  type: uint8,   unit: "°C" }
      - { name: motor_temp, type: uint8,   unit: "°C" }
      - { name: motor_vol,  type: uint8,   unit: V }
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: MsgSchema
  id: agibot_x2.schema.msg.pmu_state
  properties:
    name: aimdk_msgs/msg/PmuState
    fields_grouped:
      metadata:
        - { name: pmu_software_version, type: string }
        - { name: pmu_hardware_version, type: string }
        - { name: pmu_protocol_version, type: string }
      status:
        - { name: pmu_bool_status,  type: uint32, description: "11 位 PMU 状态位,见 events.yaml" }
        - { name: bms_status_bits,  type: uint32, description: "21 位 BMS 状态位,见 events.yaml" }
      currents_A:
        - head_power_current
        - output_48v_current
        - rk3588_current
        - output_12v_current
        - bus_48v_current
        - orin_current
      voltages_V:
        - bus_48v_pmos_voltage
        - battery_voltage
        - fan_voltage
        - output_12v_voltage
        - output_48v_voltage
        - bus_48v_voltage
        - head_power_voltage
        - orin_voltage
        - rk3588_voltage
      bms:
        - { name: battery_pack_voltage,                type: float64, unit: V }
        - { name: battery_current,                     type: float64, unit: A,   description: "充电为正,放电为负" }
        - { name: battery_output_power,                type: float64, unit: W }
        - { name: battery_temperature,                 type: float64, unit: "°C" }
        - { name: battery_remaining_capacity,          type: uint32,  unit: mAh }
        - { name: battery_remaining_capacity_percentage, type: uint8,  unit: "%" }
        - { name: battery_cycle_count,                 type: uint16,  unit: "次" }
        - { name: battery_cycle_total_capacity,        type: uint32,  unit: Ah }
        - { name: battery_balance_line_resistance,     type: uint16,  unit: "mΩ" }
  source: { type: document, locator: "aimdk.docx#§5.4.2" }

- type: MsgSchema
  id: agibot_x2.schema.msg.touch_state
  properties:
    name: aimdk_msgs/msg/TouchState
    fields:
      - { name: header,      type: MessageHeader }
      - { name: event_type,  type: uint8,  description: "触摸事件,见 events.yaml touch.*" }
      - { name: data,        type: "uint32[8]", description: "8 通道原始数值" }
      - { name: threshold,   type: "uint32[8]", description: "8 通道触摸阈值" }
      - { name: is_touched,  type: "bool[8]" }
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

- type: MsgSchema
  id: agibot_x2.schema.msg.tts_priority_level
  properties:
    name: aimdk_msgs/msg/TtsPriorityLevel
    fields:
      - { name: value, type: uint8, description: "见 behaviors.yaml priority.*" }
  source: { type: document, locator: "aimdk.docx#§5.2.1" }

