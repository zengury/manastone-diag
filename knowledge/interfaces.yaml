# AgiBot X2 — Interfaces Ontology
# Topic / Service / MsgSchema / SrvSchema —— ROS2 通信层的语义表达
# 覆盖 AimDK §5.x 所有 topic/service 声明

objects:

# ============================================================
# 关键 Topics(§5.1.2, §5.1.5, §5.1.6, §5.2.1, §5.2.2, §5.4.1, §5.4.2)
# ============================================================

# 控制类 —— 走跑
- type: Topic
  id: agibot_x2.if.topic.mc_locomotion_velocity
  properties:
    name: "/aima/mc/locomotion/velocity"
    msg_type: aimdk_msgs/msg/McLocomotionVelocity
    direction: subscribe_from_outside   # 开发者发布,系统订阅
    notes: 稳定站立模式下执行,受 MC 输入源仲裁
  source: { type: document, locator: "aimdk.docx#§5.1.2" }

# 关节控制 —— 按部位分组
- type: Topic
  id: agibot_x2.if.topic.joint_arm_command
  properties:
    name: "/aima/hal/joint/arm/command"
    msg_type: aimdk_msgs/msg/JointCommandArray
    array_length: 14
    array_order: [left_shoulder_pitch, left_shoulder_roll, left_shoulder_yaw, left_elbow, left_wrist_yaw, left_wrist_pitch, left_wrist_roll, right_shoulder_pitch, right_shoulder_roll, right_shoulder_yaw, right_elbow, right_wrist_yaw, right_wrist_pitch, right_wrist_roll]
    direction: subscribe_from_outside
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: Topic
  id: agibot_x2.if.topic.joint_arm_state
  properties:
    name: "/aima/hal/joint/arm/state"
    msg_type: aimdk_msgs/msg/JointStateArray
    qos: TRANSIENT_LOCAL
    direction: publish_to_outside
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: Topic
  id: agibot_x2.if.topic.joint_leg_command
  properties:
    name: "/aima/hal/joint/leg/command"
    msg_type: aimdk_msgs/msg/JointCommandArray
    array_length: 12
    array_order: [left_hip_pitch, left_hip_roll, left_hip_yaw, left_knee, left_ankle_pitch, left_ankle_roll, right_hip_pitch, right_hip_roll, right_hip_yaw, right_knee, right_ankle_pitch, right_ankle_roll]
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: Topic
  id: agibot_x2.if.topic.joint_leg_state
  properties:
    name: "/aima/hal/joint/leg/state"
    msg_type: aimdk_msgs/msg/JointStateArray
    qos: TRANSIENT_LOCAL
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: Topic
  id: agibot_x2.if.topic.joint_waist_command
  properties:
    name: "/aima/hal/joint/waist/command"
    msg_type: aimdk_msgs/msg/JointCommandArray
    array_length: 3
    array_order: [waist_yaw, waist_pitch, waist_roll]
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

- type: Topic
  id: agibot_x2.if.topic.joint_head_command
  properties:
    name: "/aima/hal/joint/head/command"
    msg_type: aimdk_msgs/msg/JointCommandArray
    array_length: 2
    array_order: [head_yaw, head_pitch]
    notes: "v0.8 head_pitch 占位预留,未启用"
  source: { type: document, locator: "aimdk.docx#§5.1.6" }

# 手部
- type: Topic
  id: agibot_x2.if.topic.joint_hand_command
  properties:
    name: "/aima/hal/joint/hand/command"
    msg_type: aimdk_msgs/msg/HandCommandArray
  source: { type: document, locator: "aimdk.docx#§5.1.5" }

- type: Topic
  id: agibot_x2.if.topic.joint_hand_state
  properties:
    name: "/aima/hal/joint/hand/state"
    msg_type: aimdk_msgs/msg/HandStateArray
    qos: TRANSIENT_LOCAL
  source: { type: document, locator: "aimdk.docx#§5.1.5" }

# 传感器 —— IMU
- type: Topic
  id: agibot_x2.if.topic.imu_chest
  properties:
    name: "/aima/hal/imu/chest/state"
    msg_type: sensor_msgs/msg/Imu
    qos: TRANSIENT_LOCAL
    frequency_hz: 500
    compute_unit: agibot_x2.hw.compute.pc2
    publisher_sensor: agibot_x2.hw.sensor.imu_chest
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

- type: Topic
  id: agibot_x2.if.topic.imu_torso
  properties:
    name: "/aima/hal/imu/torso/state"
    msg_type: sensor_msgs/msg/Imu
    qos: TRANSIENT_LOCAL
    frequency_hz: 500
    compute_unit: agibot_x2.hw.compute.pc2
    publisher_sensor: agibot_x2.hw.sensor.imu_torso
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

# 传感器 —— 相机(带宽敏感)
- type: Topic
  id: agibot_x2.if.topic.stereo_front_left_image
  properties:
    name: "/aima/hal/sensor/stereo_head_front_left/rgb_image"
    msg_type: sensor_msgs/msg/Image
    qos: TRANSIENT_LOCAL
    frequency_hz: 10
    bandwidth_mb_s: 90
    cross_unit_safe: false
    compute_unit: agibot_x2.hw.compute.pc2
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

- type: Topic
  id: agibot_x2.if.topic.rgbd_front_image
  properties:
    name: "/aima/hal/sensor/rgbd_head_front/rgb_image"
    msg_type: sensor_msgs/msg/Image
    qos: RELIABLE
    frequency_hz: 10
    bandwidth_mb_s: 25
    cross_unit_safe: false
    compute_unit: agibot_x2.hw.compute.pc2
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

- type: Topic
  id: agibot_x2.if.topic.rgbd_front_pointcloud
  properties:
    name: "/aima/hal/sensor/rgbd_head_front/depth_pointcloud"
    msg_type: sensor_msgs/msg/PointCloud2
    qos: RELIABLE
    frequency_hz: 10
    compute_unit: agibot_x2.hw.compute.pc2
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

- type: Topic
  id: agibot_x2.if.topic.lidar_pointcloud
  properties:
    name: "/aima/hal/sensor/lidar_chest_front/lidar_pointcloud"
    msg_type: sensor_msgs/msg/PointCloud2
    qos: TRANSIENT_LOCAL
    frequency_hz: 10
    bandwidth_mb_s: 10
    cross_unit_safe: false
    compute_unit: agibot_x2.hw.compute.pc2
    publisher_sensor: agibot_x2.hw.sensor.lidar_chest_front
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

- type: Topic
  id: agibot_x2.if.topic.touch_head
  properties:
    name: "/aima/hal/sensor/touch_head"
    msg_type: aimdk_msgs/msg/TouchState
    qos: TRANSIENT_LOCAL
    frequency_hz: 100
  source: { type: document, locator: "aimdk.docx#§5.4.1" }

# 电源管理
- type: Topic
  id: agibot_x2.if.topic.pmu_state
  properties:
    name: "/aima/hal/pmu/state"
    msg_type: aimdk_msgs/msg/PmuState
    frequency_hz: 0.2
    compute_unit: agibot_x2.hw.compute.pc2
    publisher_hw: agibot_x2.hw.power
  source: { type: document, locator: "aimdk.docx#§5.4.2" }

# VAD 音频流
- type: Topic
  id: agibot_x2.if.topic.vad_audio_output
  properties:
    name: "/agent/process_audio_output"
    msg_type: aimdk_msgs/msg/ProcessedAudioOutput
    frequency_hz: 25
    notes: "触发式,识别到语音后突发,之后约 25Hz"
    compute_unit: agibot_x2.hw.compute.pc3
  source: { type: document, locator: "aimdk.docx#§5.2.1" }

# 表情状态反馈
- type: Topic
  id: agibot_x2.if.topic.face_ui_status
  properties:
    name: "/face_ui_proxy/status"
    msg_type: aimdk_msgs/msg/FaceEmojiStatus
    qos: RELIABLE
    frequency_hz: 1
  source: { type: document, locator: "aimdk.docx#§5.2.2" }

