# AgiBot X2 — Hardware Ontology (URDF-patched by roboonto/importers/urdf.py)

objects:
- type: ComputeUnit
  id: agibot_x2.hw.compute.pc1
  properties:
    role: motion_control
    network_address: 10.0.1.40
    soc: RK3588s + RK3588
    notes: 运控计算单元,禁止部署二开程序(运控实时要求)
  source:
    type: document
    locator: aimdk.docx#§1.3.1
- type: ComputeUnit
  id: agibot_x2.hw.compute.pc2
  properties:
    role: development
    network_address: 10.0.1.41
    soc: Jetson Orin NX
    cpu: 8-core Arm Cortex-A78AE v8.2 64-bit
    gpu: 1024-core NVIDIA Ampere GPU with 32 Tensor Cores
    ai_tops: 157
    memory_gb: 16
    storage_gb: 512
    l2_cache_mb: 2
    l3_cache_mb: 4
    notes: 开发计算单元(二开推荐部署位置),挂载大部分传感器
  source:
    type: document
    locator: aimdk.docx#§1.3.2
- type: ComputeUnit
  id: agibot_x2.hw.compute.pc3
  properties:
    role: interaction
    network_address: 10.0.1.42
    soc: RK3588
    notes: 交互计算单元,媒体文件必须放置于此且全员可读
  source:
    type: document
    locator: aimdk.docx#§5.2.1
- type: PowerSubsystem
