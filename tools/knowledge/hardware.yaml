# ============================================================
# 电机驱动保护阈值(从 2026-04-08 真实 session log 反推,EtherCAT 初始化时配置)
# 这些不在 AimDK 文档里,但在 ecat_x2dcu_api 初始化日志中明确写出
# 一旦电机超出阈值,DCU 会自动断电保护
# ============================================================

- type: ProtectionThreshold
  id: agibot_x2.hw.motor.protect.over_current
  properties:
    parameter: motor_over_current
    value: 30.0
    unit: A
    scope: per_motor_node
    notes: |
      EtherCAT slave 启动时由 ecat_x2dcu_api.cpp 写入到每个 nodeId
      日志样本:"Motor protect over current: slave_id: 1, nodeId: N, overCurrent: 30.000000"
  source:
    type: log_observation
    locator: "session_2026_04_08, hal_ethercat_x2.log line ~1084"
    confidence: high
    diff_status: pending_aimdk_confirmation

- type: ProtectionThreshold
  id: agibot_x2.hw.motor.protect.over_voltage
